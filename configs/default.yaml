seed: 42
n_folds: 5
target_col: survived
id_col: id
feature_version: v1

logistic_regression:
  C: 1.0
  penalty: l2
  solver: liblinear
  max_iter: 1000

random_forest:
  n_estimators: 500
  max_depth: 5
  min_samples_leaf: 3
  max_features: sqrt
  random_state: 42

xgboost:
  n_estimators: 500
  learning_rate: 0.03
  max_depth: 3
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0
  random_state: 42
  eval_metric: logloss

lightgbm:
  n_estimators: 500
  learning_rate: 0.03
  num_leaves: 15
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  verbose: -1

mlp:
  hidden_layer_sizes: [64, 32]
  activation: relu
  alpha: 0.001
  learning_rate_init: 0.001
  early_stopping: true
  max_iter: 500
  random_state: 42
